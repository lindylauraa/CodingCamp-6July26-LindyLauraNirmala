<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>


    <!--Header-->
    <h1 class="main-title">Expense &amp; Budget Visualizer</h1>

    <header>

      <span class="balance-label">Total Balance:</span>
      <div id="balance-display" aria-live="polite">$0.00</div>

      <div id="error-banner" role="alert" hidden>
        <span id="error-message"></span>
        <button id="dismiss-banner" type="button" aria-label="Dismiss error">&#x2715;</button>
      </div>
    </header>

    <!--Main-->
    <main>
      <!-- Transaction input form -->
      <section id="form-section">
        <h2>Add Transaction</h2>
        <form id="transaction-form" novalidate>
          <div class="form-group">
            <label for="name-input">Item Name</label>
            <input
              type="text"
              id="name-input"
              name="name"
              maxlength="100"
              placeholder="Enter Item Name"
              autocomplete="off"
            />
          </div>

          <div class="form-group">
            <label for="amount-input">Amount</label>
            <input
              type="number"
              id="amount-input"
              name="amount"
              min="0.01"
              step="0.01"
              placeholder="0.00"
            />
          </div>

          <div class="form-group">
            <label for="category-select">Category</label>
            <select id="category-select" name="category">
              <option value="">-- Select a category --</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
          </div>

          <div class="form-group">
            <label for="custom-category-input">Custom Category</label>
            <input
              type="text"
              id="custom-category-input"
              name="custom-category"
              maxlength="50"
              placeholder="Add a custom category (optional)"
              autocomplete="off"
            />
          </div>

          <button type="submit">Add Transaction</button>
        </form>
      </section>

      <!--Data-->
      <section id="controls-section">
        <h2>Filter &amp; Sort</h2>

        <div class="control-group">
          <label for="filter">Filter by</label>
          <select id="filter" name="filter">
            <option value="">All Time</option>
            <option value="today">Today</option>
            <option value="this-month">This Month</option>
            <option value="this-year">This Year</option>
          </select>
        </div>

        <div class="control-group">
          <label for="sort-select">Sort By</label>
          <select id="sort-select" name="sort">
            <option value="date">Date (default)</option>
            <option value="category">Category (A–Z)</option>

          </select>
        </div>
      </section>

      <!--Transactions-->
      <section id="list-section">
        <h2>Transactions</h2>
        <ul id="transaction-list" aria-label="Transaction list"></ul>
      </section>

      <!-- Pie chart -->
      <section id="chart-section">
        <h2>Spending by Category</h2>
        <canvas id="expense-chart" aria-label="Spending by category pie chart" role="img"></canvas>
        <p id="chart-fallback" hidden>Chart could not be loaded. Please check your connection and reload the page.</p>
        <p id="chart-no-data" aria-live="polite">No data available</p>
      </section>
    </main>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
